<?xml version="1.0" encoding="UTF-8"?>
<!-- Pixelforge Logo - Retro Gaming Style -->
<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="160" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Grid pattern (pixel aesthetic) -->
  <g opacity="0.1">
    <line x1="40" y1="0" x2="40" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="40" x2="160" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="160" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="160" y2="120" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- "pf" Pixel Art Text -->
  <g transform="translate(20, 30)">
    <!-- P - Left column -->
    <rect x="0" y="0" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="12" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="24" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="36" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="48" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="60" width="12" height="12" fill="#00ff88"/>
    <rect x="0" y="72" width="12" height="12" fill="#00ff88"/>

    <!-- P - Top bar -->
    <rect x="12" y="0" width="12" height="12" fill="#00ff88"/>
    <rect x="24" y="0" width="12" height="12" fill="#00ff88"/>
    <rect x="36" y="0" width="12" height="12" fill="#00ff88"/>

    <!-- P - Right vertical -->
    <rect x="36" y="0" width="12" height="12" fill="#00ff88"/>
    <rect x="36" y="12" width="12" height="12" fill="#00ff88"/>
    <rect x="36" y="24" width="12" height="12" fill="#00ff88"/>
    <rect x="36" y="36" width="12" height="12" fill="#00ff88"/>

    <!-- P - Middle bar -->
    <rect x="12" y="36" width="12" height="12" fill="#00ff88"/>
    <rect x="24" y="36" width="12" height="12" fill="#00ff88"/>

    <!-- F - Left column -->
    <rect x="60" y="0" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="12" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="24" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="36" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="48" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="60" width="12" height="12" fill="#00d4ff"/>
    <rect x="60" y="72" width="12" height="12" fill="#00d4ff"/>

    <!-- F - Top bar -->
    <rect x="72" y="0" width="12" height="12" fill="#00d4ff"/>
    <rect x="84" y="0" width="12" height="12" fill="#00d4ff"/>
    <rect x="96" y="0" width="12" height="12" fill="#00d4ff"/>

    <!-- F - Middle bar -->
    <rect x="72" y="36" width="12" height="12" fill="#00d4ff"/>
    <rect x="84" y="36" width="12" height="12" fill="#00d4ff"/>
    <rect x="96" y="36" width="12" height="12" fill="#00d4ff"/>

    <!-- F - Bottom bar (partial) -->
    <rect x="72" y="72" width="12" height="12" fill="#00d4ff"/>
  </g>

  <!-- Pixel cursor/joystick indicator -->
  <g transform="translate(20, 115)">
    <!-- Controller shape -->
    <rect x="0" y="8" width="12" height="12" fill="#ff6b6b"/>
    <rect x="12" y="8" width="12" height="12" fill="#ff6b6b"/>
    <rect x="24" y="8" width="12" height="12" fill="#ff6b6b"/>
    <rect x="0" y="20" width="12" height="12" fill="#ff6b6b"/>
    <rect x="12" y="20" width="12" height="12" fill="#c0392b"/>
    <rect x="24" y="20" width="12" height="12" fill="#ff6b6b"/>
    <rect x="0" y="32" width="12" height="12" fill="#ff6b6b"/>
    <rect x="12" y="32" width="12" height="12" fill="#ff6b6b"/>
    <rect x="24" y="32" width="12" height="12" fill="#ff6b6b"/>

    <!-- D-pad -->
    <rect x="48" y="8" width="12" height="12" fill="#f1c40f"/>
    <rect x="48" y="20" width="12" height="12" fill="#f1c40f"/>
    <rect x="36" y="20" width="12" height="12" fill="#f1c40f"/>
    <rect x="60" y="20" width="12" height="12" fill="#f1c40f"/>
    <rect x="48" y="32" width="12" height="12" fill="#f1c40f"/>

    <!-- Buttons -->
    <rect x="84" y="12" width="8" height="8" fill="#3498db"/>
    <rect x="100" y="12" width="8" height="8" fill="#e74c3c"/>
    <rect x="92" y="4" width="8" height="8" fill="#2ecc71"/>
    <rect x="92" y="20" width="8" height="8" fill="#9b59b6"/>
  </g>

  <!-- Sparkle effects -->
  <rect x="140" y="20" width="6" height="6" fill="#f1c40f" opacity="0.8"/>
  <rect x="130" y="35" width="4" height="4" fill="#00ff88" opacity="0.6"/>
  <rect x="145" y="50" width="5" height="5" fill="#00d4ff" opacity="0.7"/>

  <!-- Bottom accent -->
  <rect x="30" y="148" width="100" height="4" rx="2" fill="#00ff88" opacity="0.5"/>
</svg>
